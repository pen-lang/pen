name: pen/setup
description: Sets up a build environment
inputs: {}
outputs: {}
runs:
  using: composite
  steps:
    - uses: ruby/setup-ruby@4dc28cf14d77b0afa6832d9765ac422dbf0dfedd # v1.298.0
    - uses: raviqqe/cargo-cache@main
    - uses: raviqqe/enable-homebrew@main
      with:
        stable: true
    - run: tools/ci/github/setup.sh
      shell: bash
